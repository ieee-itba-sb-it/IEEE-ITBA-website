<div class="main-container">
    <div class="row" style="height: 100%">

        <div class="mainFrame" style="padding-top: 90px">
            <div class="row d-flex flex-column align-items-center justify-content-center">

                <mat-card class="d-flex flex-column align-items-center mb-5"
                          style="max-width: 75%; width: fit-content;">

                    <mat-card-header class="exam-header">
                        <mat-card-title class="exam-title">Examen de Python</mat-card-title>
                    </mat-card-header>

                    <mat-card-content class="exam-card-content mt-2">
                        <form *ngIf="!reviewMode" [formGroup]="examForm" (ngSubmit)="onSubmit()">

                            <div formArrayName="answers" class="questions-container" >

                                <div *ngFor="let q of questions; let i = index"
                                     [formGroupName]="i"
                                     class="question-card">
                                    <p class="question-title"><b>Pregunta {{ i + 1 }}:</b> {{ q.question }}</p>

                                    <div class="options-container">
                                        <mat-radio-group formControlName="answer" class="d-flex flex-column">
                                            <mat-radio-button *ngFor="let opt of q.answers"
                                                              [value]="opt.answer"
                                                              class="option"
                                                              color="primary">
                                                {{ opt.answer }}
                                            </mat-radio-button>
                                        </mat-radio-group>
                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-center">
                                <button class="submit-exam-button"
                                        type="submit">
                                    Enviar examen
                                </button>
                            </div>

                        </form>
                        <div  *ngIf="reviewMode" class="questions-container" >
                            <div *ngFor="let q of submittedExam.questions; let i=index" class="question-card">
                                <p class="question-title"><b>Pregunta {{ i + 1 }}:</b> {{ q.question }}</p>
                                <div class="options-container">
                                    <mat-radio-group [value]="getSelectedAnswer(q.answers)" class="d-flex flex-column">
                                        <mat-radio-button *ngFor="let opt of q.answers" class="option"
                                                 [value] = "opt.answer"
                                                 [disabled]="true"
                                                 [class.correct]="opt.selected && opt.isCorrect"
                                                 [class.wrong]="opt.selected && !opt.isCorrect"
                                                 [class.selected]="opt.selected">
                                                {{ opt.answer }}
                                        </mat-radio-button>
                                    </mat-radio-group>
                                </div>
                            </div>
                        </div>
                    </mat-card-content>
                </mat-card>

            </div>
        </div>

    </div>
</div>
