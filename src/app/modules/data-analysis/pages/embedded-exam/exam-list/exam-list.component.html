<div class="main-container event">
    <h1>Mis exámenes de Python</h1>

    <div title="Descripción">
        <p class="description-texto">
            A continuación encontrarás los exámenes disponibles. Se habilita uno por día hasta aprobar.
        </p>
    </div>

    <div title="Exámenes disponibles">
        <div class="exam-grid">
            <mat-card *ngFor="let exam of exams" class="exam-card">
                <div class="card-header">
                    <h3 class="exam-title">{{exam.title}}</h3>
                    <div class="badge success" *ngIf="exam.passed">Aprobado</div>
                    <div class="badge failed" *ngIf="!exam.passed && exam.attempts >0 ">Desaprobado</div>
                </div>


                <mat-card-actions>
                    <button *ngIf="!exam.passed && exam.attempts === 0"
                        class="ieeecard-button"
                        [disabled]="!exam.available"
                        [routerLink]="[exam.id]"
                    >Iniciar examen</button>
                    <button *ngIf="exam.attempts > 0"
                        class="ieeecard-button"
                        [routerLink]="[exam.id]">
                        Revisar examen</button>
                </mat-card-actions>

            </mat-card>
        </div>


    </div>


</div>
