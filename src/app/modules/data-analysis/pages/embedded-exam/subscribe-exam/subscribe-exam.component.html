<div class="subscribe-container">

    <div>

        <mat-card class="subscribe-card">

            <mat-card-header>
                <mat-card-title class="title">
                    Inscripción al curso
                </mat-card-title>
            </mat-card-header>

            <mat-card-content>
                <form class="subscribe-card">
                    <p> Para acceder a los exámenes primero debés inscribirte.</p>

                    <mat-form-field class="w-100">
                        <mat-label>Email</mat-label>
                        <input matInput type="email" [value]="user?.email" disabled>
                    </mat-form-field>

                    <mat-form-field class="w-100">
                        <mat-label>Fecha de inscripción</mat-label>
                        <input matInput [value]="today" disabled>
                    </mat-form-field>

                    <button class="ieee-button" (click)="enroll()" type="button">
                        Inscribirme
                    </button>

                </form>

            </mat-card-content>

        </mat-card>

    </div>


</div>
